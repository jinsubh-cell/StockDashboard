<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="한국 주식 시장 AI 추천 대시보드 - 코스피, 코스닥 실시간 시세 및 종목 추천" />
    <title>StockPick | 주식 추천 대시보드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial/dist/chartjs-chart-financial.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <link rel="stylesheet" href="/style.css" />
</head>

<body>
    <div class="app" id="app">
        <!-- Global Loading Overlay -->
        <div class="global-loader-overlay" id="global-loader" style="display: none;">
            <div class="loader-content">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" class="spin loader-icon"
                    stroke="var(--accent-primary)" stroke-width="2">
                    <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3" />
                </svg>
                <div class="loader-text">데이터를 불러오는 중입니다...</div>
            </div>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                            <rect width="28" height="28" rx="8" fill="url(#logoGrad)" />
                            <path d="M8 18L12 12L16 15L20 8" stroke="white" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <defs>
                                <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
                                    <stop stop-color="#6C5CE7" />
                                    <stop offset="1" stop-color="#00D26A" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <span class="logo-text">StockPick</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#/" class="nav-item active" data-page="dashboard" id="nav-dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    <span>대시보드</span>
                </a>
                <a href="#/recommend" class="nav-item" data-page="recommend" id="nav-recommend">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                    </svg>
                    <span>AI 추천</span>
                </a>
                <a href="#/market" class="nav-item" data-page="market" id="nav-market">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                    </svg>
                    <span>시장 현황</span>
                </a>
                <a href="#/ta" class="nav-item" data-page="ta" id="nav-ta">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 3v18h18" />
                        <path d="M18 17V9" />
                        <path d="M13 17V5" />
                        <path d="M8 17v-3" />
                    </svg>
                    <span>기술적 분석</span>
                </a>
                <a href="#/backtest" class="nav-item" data-page="backtest" id="nav-backtest">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                    </svg>
                    <span>백테스팅</span>
                </a>
                <a href="#/factor" class="nav-item" data-page="factor" id="nav-factor">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon
                            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                    </svg>
                    <span>팩터 분석</span>
                </a>
                <a href="#/screener" class="nav-item" data-page="screener" id="nav-screener">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                        <path d="M11 8v6M8 11h6"/>
                    </svg>
                    <span>조건검색</span>
                </a>
                <a href="#/trading" class="nav-item" data-page="trading" id="nav-trading">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="1" x2="12" y2="23" />
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                    </svg>
                    <span>주식 거래</span>
                </a>
                <a href="#/scalping" class="nav-item" data-page="scalping" id="nav-scalping">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
                    </svg>
                    <span>초단타 스캘핑</span>
                </a>
                <a href="#/watchlist" class="nav-item" data-page="watchlist" id="nav-watchlist">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    <span>관심 종목</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="market-status">
                    <div class="status-dot open"></div>
                    <span>장 마감</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="main-header" id="main-header">
                <div class="header-left">
                    <button class="menu-toggle" id="menu-toggle">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="3" y1="6" x2="21" y2="6" />
                            <line x1="3" y1="12" x2="21" y2="12" />
                            <line x1="3" y1="18" x2="21" y2="18" />
                        </svg>
                    </button>
                    <h1 class="page-title" id="page-title">대시보드</h1>
                </div>
                <div class="header-right" style="display:flex; align-items:center;">
                    <!-- Account Panel -->
                    <div class="account-panel" id="account-panel">
                        <div class="account-status" id="account-status">
                            <div class="account-status-dot offline" id="account-dot"></div>
                            <span id="account-label">미연결</span>
                        </div>
                        <div class="account-balance-mini" id="account-balance-mini" style="display:none;">
                            <span class="account-cash" id="account-cash-display">-</span>
                        </div>
                        <button class="btn btn-outline account-btn" id="account-login-btn" title="키움 로그인">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                                <polyline points="10 17 15 12 10 7"/>
                                <line x1="15" y1="12" x2="3" y2="12"/>
                            </svg>
                            <span id="account-btn-text">로그인</span>
                        </button>
                        <div class="account-dropdown" id="account-dropdown" style="display:none;">
                            <div class="account-dropdown-header">
                                <div class="account-dropdown-title" id="dropdown-title">계좌 정보</div>
                                <div class="account-dropdown-mode" id="dropdown-mode"></div>
                            </div>
                            <div class="account-dropdown-body" id="dropdown-body">
                                <div class="account-info-row"><span>예수금</span><span id="dd-cash">-</span></div>
                                <div class="account-info-row"><span>총평가</span><span id="dd-eval">-</span></div>
                                <div class="account-info-row"><span>총손익</span><span id="dd-pnl">-</span></div>
                                <div class="account-info-row"><span>손익률</span><span id="dd-pnl-pct">-</span></div>
                                <div class="account-info-row"><span>보유종목</span><span id="dd-holdings">-</span></div>
                            </div>
                            <div class="account-dropdown-footer">
                                <div class="account-ws-status"><span class="account-ws-dot" id="dd-ws-dot"></span> <span id="dd-ws-label">WebSocket</span></div>
                                <button class="btn btn-outline account-dropdown-btn" id="dd-refresh-btn">새로고침</button>
                                <button class="btn account-dropdown-btn account-logout-btn" id="dd-logout-btn">로그아웃</button>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-outline" id="refresh-data-btn"
                        style="margin-right: 15px; display:flex; align-items:center; gap:6px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                        데이터 갱신
                    </button>
                    <div class="search-wrapper" id="search-wrapper">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <input type="text" class="search-input" id="search-input" placeholder="종목명 또는 코드 검색..."
                            autocomplete="off" />
                        <div class="search-dropdown" id="search-dropdown"></div>
                    </div>
                    <div class="header-time" id="header-time"></div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-content" id="page-content">
                <!-- Dynamic content rendered here -->
            </div>
        </main>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>

</html>
